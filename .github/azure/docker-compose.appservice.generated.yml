version: "3.8"

services:
  nginx:
    image: clebermargarida/ballast-lane-board-nginx:1.0.0
    ports:
      - "8080:8080"

  api:
    image: clebermargarida/ballast-lane-board:1.0.0
    environment:
      ASPNETCORE_URLS: "http://+:8081"

  keycloak:
    image: clebermargarida/ballast-lane-board-keycloak:1.0.0
    environment:
      KC_DB: postgres
      KC_HTTP_PORT: "8180"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
